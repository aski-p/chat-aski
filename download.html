<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Aski - 다운로드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222224;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{text-align:center;max-width:520px;width:100%}
h1{font-size:2.2rem;margin-bottom:6px;color:#fff}
.subtitle{color:#888;font-size:.95rem;margin-bottom:2.4rem}
.card{background:#2a2a2c;border-radius:16px;padding:22px 20px;margin-bottom:14px;text-align:left;transition:.2s}
.card:hover{background:#333}
.card-icon{font-size:2.4rem;margin-bottom:8px;display:block}
.card-title{font-weight:700;font-size:1.15rem;margin-bottom:4px}
.card-desc{color:#aaa;font-size:.85rem;margin-bottom:14px;line-height:1.5}
.card a,.card button{display:inline-block;background:#3b82f6;color:#fff;text-decoration:none;padding:10px 24px;border-radius:10px;font-weight:600;font-size:.95rem;transition:.15s;border:none;cursor:pointer}
.card a:hover,.card button:hover{background:#2563eb}
.home-btn{display:inline-block;margin-top:24px;color:#888;text-decoration:none;font-size:.9rem;padding:10px 20px;border:1px solid #444;border-radius:10px;transition:.2s}
.home-btn:hover{color:#fff;border-color:#888}
</style>
</head>
<body>
<div class="container">
  <h1>Chat Aski</h1>
  <p class="subtitle">플랫폼을 선택하여 설치하세요</p>

  <!-- Android APK -->
  <div class="card">
    <span class="card-icon">&#129302;</span>
    <div class="card-title">Android APK</div>
    <div class="card-desc">안드로이드 기기에서 직접 실행 가능한 파일입니다.<br>다운로드 후 파일을 탭하여 설치하세요.</div>
    <a href="/chat-aski.apk" download><b>APK 다운로드</b></a>
  </div>

  <!-- iOS PWA -->
  <div class="card">
    <span class="card-icon">&#127820;</span>
    <div class="card-title">iOS / iPadOS</div>
    <div class="card-desc">프로필을 설치하면 홈 화면에 앱이 추가됩니다.<br>설치 후 아이콘을 탭해 사용하세요.</div>
    <a href="/ChatAski.mobileconfig" download><b>iOS 프로필 설치</b></a>
  </div>

  <!-- Home 버튼 -->
  <a class="home-btn" href="/">&larr; 홈으로 돌아가기</a>
</div>
</body>
</html>
